name: CodeQL

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.txt"
      - "**/.gitignore"
      - "**/LICENSE*"
    branches-ignore:
      - "dependabot/**"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.txt"
      - "**/.gitignore"
      - "**/LICENSE*"
    branches-ignore:
      - "dependabot/**"

  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  CodeQL:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: "go"

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
