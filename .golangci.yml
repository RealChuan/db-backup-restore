version: "2"
run:
  go: "1.26"
linters:
  default: none
  enable:
    # 必需 linters（项目规范要求）
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - revive
    - gocritic
    - gocyclo
    - goconst
    - bodyclose
    - noctx
    - rowserrcheck
    # 额外推荐 linters
    - errorlint
    - unused
    - gosec
    - funlen
  settings:
    funlen:
      lines: 80
      statements: 50
    goconst:
      min-len: 3
      min-occurrences: 3
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: unused-parameter
          severity: warning
        - name: unreachable-code
          severity: error
    gosec:
      excludes:
        - G103  # unsafe 调用，Windows API 需要
        - G104  # 与 errcheck 重复
        - G122  # filepath.Walk TOCTOU，备份场景可接受
        - G204  # 子进程参数，本项目需要
        - G301  # 目录权限，备份场景需要
        - G302  # 文件权限
        - G304  # 文件路径变量，备份场景需要
        - G306  # WriteFile 权限
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Println
  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
    rules:
      - linters:
          - funlen
        path: cmd/
      - linters:
          - funlen
        path: pkg/utils/logger.go
      - linters:
          - goconst
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
